# =============================================================================
# QUERIES
# =============================================================================
query CurrentCompany {
  getDashboardData {
    currentCompany {
      id
      name
      users {
        id
        name
        avatarUrl
      }
    }
    projectStatusData {
      color
      count
      nameKey
    }
    recentImages {
      date
      id
      projectName
      url
    }
    recentLocations {
      id
      lastVisit
      name
      projectsCount
    }
    recentProjects {
      id
      name
      location
      progress
      status
      documentsCount
      commentsCount
      createdAt
      members {
        id
        name
      }
    }
  }
}

query Members {
  getCompanyMembers {
    members {
      id
      isOnline
      name
      role
      projects {
        id
        name
        progress
        status
      }
    }
    onlineCount
    totalProjects
  }
}

# =============================================================================
# MUTATIONS
# =============================================================================
mutation CreateCompany($input: CreateCompanyInput!) {
  createCompany(input: $input) {
    message
    company {
      id
      createdAt
      industry
      name
      size
      updatedAt
    }
    token
    user {
      id
      name
      email
      avatarUrl
      role
      company {
        createdAt
        id
        industry
        name
        size
        updatedAt
        users {
          id
          email
          name
        }
      }
    }
  }
}