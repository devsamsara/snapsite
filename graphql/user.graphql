query Me {
    me {
        id
        email
        name
        lastName
        nickname
        avatarUrl
        role
        status
        company {
            id
            name
        }
    }
}
mutation UpdateUserPicture($userId: ID!, $picture: String!) {
    updateUserPicture(userId: $userId, picture: $picture) {
        id
        avatarUrl
    }
}
mutation DeleteUser($id: ID!) {
    deleteUser(id: $id)
}

mutation DeleteCompany($id: ID!) {
    deleteCompany(id: $id)
}

mutation UpdateUser($updateUserId: ID!, $input: UpdateUserInput!) {
    updateUser(id: $updateUserId, input: $input) {
        avatarUrl
        company {
            id
            name
            users {
                id
                name
            }
        }
        createdAt
        id
        email
        lastName
        name
        nickname
        phone
        projects {
            createdAt
            description
            endDate
            id
            latitude
            location
            longitude
            name
            members {
                id
                email
                name
                lastName
            }
            notes {
                author {
                    company {
                        id
                        name
                    }
                }
            }
            photos {
                id
                url
                createdAt
            }
            progress
            startDate
            status
            thumbnail
            timeline {
                id
                description
                createdAt
                photoUrl
                project {
                    id
                    description
                }
                title
                type
                updatedAt
            }
        }
        role
        status
        updatedAt
    }
}

mutation RegisterPushToken($token: String!, $platform: String!) {
    registerPushToken(token: $token, platform: $platform) {
        enabled
        token
    }
}

mutation TogglePushToken($token: String!, $enabled: Boolean!) {
    togglePushToken(token: $token, enabled: $enabled) {
        code
        enabled
        message
        success
        token
    }
}