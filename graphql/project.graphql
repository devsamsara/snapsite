query GetMyProjects {
    getMyProjects {
        createdAt
        description
        id
        location
        name
        progress
        startDate
        thumbnail
        status
        photos {
            id
            createdAt
            url
        }
    }
}

query FindProject($findProjectId: ID!) {
    findProject(id: $findProjectId) {
        id
        startDate
        endDate
        progress
        thumbnail
        location
        latitude
        longitude
        name
        status
        timeline {
            createdAt
            description
            id
            photoUrl
            title
            type
            updatedAt
        }
        createdAt
        description
        members {
            id
            name
            role
            createdAt
            status
            email
            updatedAt
        }
        notes {
            author {
                id
                name
                createdAt
                updatedAt
                role
                status
                email
            }
            content
            createdAt
            id
            pinned
            updatedAt
            project {
                id
            }
        }
        photos {
            createdAt
            id
            url
            tags
            caption
        }
    }
}

mutation CreateProject($input: CreateProjectInput!) {
    createProject(input: $input) {
        id
        location
        longitude
        latitude
        name
        thumbnail
    }
}

mutation AddPhoto($projectId: ID!, $url: String!, $caption: String, $tags: [String!]) {
    addPhoto(projectId: $projectId, url: $url, caption: $caption, tags: $tags) {
        caption
        createdAt
        id
        tags
        url
    }
}

mutation DeletePhoto($photoId: ID!) {
    deletePhoto(id: $photoId)
}

query GetUploadUrl($projectId: ID!, $fileName: String!, $mimeType: String!) {
    getUploadUrl(projectId: $projectId, fileName: $fileName, mimeType: $mimeType) {
        uploadUrl
        fileUrl
    }
}

mutation UpdatePhoto($id: ID!, $url: String, $caption: String, $tags: [String!]) {
    updatePhoto(id: $id, url: $url, caption: $caption, tags: $tags) {
        id
        url
        caption
        tags
        createdAt
    }
}

mutation UpdateProject($id: ID!, $input: UpdateProjectInput!) {
    updateProject(id: $id, input: $input) {
        id
        name
        location
        latitude
        longitude
        status
        startDate
        endDate
    }
}