query GetMyProjects {
    getMyProjects {
        createdAt
        description
        id
        location
        name
        progress
        startDate
        thumbnail
        status
        photos {
            id
            createdAt
            url
        }
    }
}

query FindProject($findProjectId: ID!) {
    findProject(id: $findProjectId) {
        id
        startDate
        endDate
        progress
        thumbnail
        location
        name
        status
        timeline {
            createdAt
            description
            id
            photoUrl
            title
            type
            updatedAt
        }
        createdAt
        description
        members {
            id
            name
            role
            createdAt
            status
            email
            updatedAt
        }
        notes {
            author {
                id
                name
                createdAt
                updatedAt
                role
                status
                email
            }
            content
            createdAt
            id
            pinned
            updatedAt
            project {
                id
            }
        }
        photos {
            createdAt
            id
            url
            tags
            caption
        }
    }
}

mutation CreateProject($input: CreateProjectInput!) {
    createProject(input: $input) {
        id
        location
        longitude
        latitude
        name
        thumbnail
    }
}

